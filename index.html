<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1e3c72">
<title>Image Converter App</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" href="logo.png">

<style>
*{box-sizing:border-box;}
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#1e3c72,#2a5298);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:15px;
}

.container{
background:#fff;
width:100%;
max-width:500px;
padding:20px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h2{text-align:center;}

input,select,button{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

.row{
display:flex;
gap:10px;
}

.row input{width:50%;}

button{
border:none;
font-weight:bold;
cursor:pointer;
}

.apply-btn{background:#4CAF50;color:white;}
.download-btn{background:#2196F3;color:white;}

canvas{
margin-top:15px;
width:100%;
max-height:300px;
border-radius:10px;
border:1px solid #ddd;
}
</style>
</head>
<body>

<div class="container">
<h2>🖼 Image Converter</h2>

<input type="file" id="upload" accept="image/*">

<div class="row">
<input type="number" id="width" placeholder="Width">
<input type="number" id="height" placeholder="Height">
</div>

<select id="format">
<option value="image/png">PNG</option>
<option value="image/jpeg">JPG</option>
<option value="image/webp">WEBP</option>
</select>

<input type="number" id="quality" placeholder="Quality (0.1 - 1)" step="0.1" min="0.1" max="1">

<button class="apply-btn" onclick="resizeImage()">Apply</button>
<button class="download-btn" onclick="downloadImage()">Download</button>

<canvas id="canvas"></canvas>
</div>

<script>
const upload=document.getElementById("upload");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
let img=new Image();

upload.addEventListener("change",function(e){
const reader=new FileReader();
reader.onload=function(event){
img.onload=function(){
canvas.width=img.width;
canvas.height=img.height;
ctx.drawImage(img,0,0);
};
img.src=event.target.result;
};
reader.readAsDataURL(e.target.files[0]);
});

function resizeImage(){
const width=document.getElementById("width").value;
const height=document.getElementById("height").value;

canvas.width=width||img.width;
canvas.height=height||img.height;

ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.drawImage(img,0,0,canvas.width,canvas.height);
}

function downloadImage(){
const format=document.getElementById("format").value;
const quality=document.getElementById("quality").value||1;

const link=document.createElement("a");
link.href=canvas.toDataURL(format,quality);
link.download="converted-image."+format.split("/")[1];
link.click();
}

// Register Service Worker
if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
